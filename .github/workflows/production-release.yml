name: Production Release (D1 + API)

# إصدار إنتاج كامل: ترحيل D1 ثم نشر Worker — تشغيل يدوي فقط
on:
  workflow_dispatch:
    inputs:
      migration_set:
        description: "ترحيل D1 قبل النشر"
        required: true
        default: upgrade
        type: choice
        options:
          - upgrade
          - all
          - skip

concurrency:
  group: production-release
  cancel-in-progress: false

jobs:
  migrate:
    if: inputs.migration_set != 'skip'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: D1 migrate
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          chmod +x scripts/d1-remote-migrate.sh
          ./scripts/d1-remote-migrate.sh "${{ inputs.migration_set }}"

  deploy-api:
    needs: migrate
    if: always() && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install API deps
        working-directory: apps/api
        run: npm install

      - name: Check Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::Add CLOUDFLARE_API_TOKEN in GitHub → Settings → Secrets → Actions"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Add CLOUDFLARE_ACCOUNT_ID in GitHub → Settings → Secrets → Actions"
            exit 1
          fi

      - name: Wrangler whoami
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler whoami

      - name: Deploy Worker (production)
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --env production

      - name: Health check
        run: |
          curl -fsS -o health.json "https://winter-term-cb93.a-samani092.workers.dev/api/health"
          node -e "const h=JSON.parse(require('fs').readFileSync('health.json','utf8')); if(!h.ok) process.exit(1); console.log('health OK', JSON.stringify(h));"

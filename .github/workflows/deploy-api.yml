name: Deploy API (Worker)

on:
  push:
    branches: [main, master]
    paths:
      - "apps/api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/api
        run: npm install

      - name: Check Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::Add CLOUDFLARE_API_TOKEN in GitHub → Settings → Secrets → Actions"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Add CLOUDFLARE_ACCOUNT_ID in GitHub → Settings → Secrets → Actions"
            exit 1
          fi

      - name: Deploy Worker (winter-term-cb93)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: deploy
          wranglerVersion: "3"

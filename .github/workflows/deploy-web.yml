# نشر الواجهة إلى Cloudflare Pages (بدون wrangler-action — أخطاء أوضح)
# إن كان Pages مربوطاً بـ Git مباشرة، يكفي بناء Dashboard؛ هذا الـ workflow اختياري.

name: Deploy Web (Pages)

on:
  push:
    branches: [main, master]
    paths:
      - "apps/web/**"
      - ".github/workflows/deploy-web.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::Add CLOUDFLARE_API_TOKEN in GitHub Secrets"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Add CLOUDFLARE_ACCOUNT_ID in GitHub Secrets"
            exit 1
          fi

      - name: Build web app
        working-directory: apps/web
        run: |
          set -euxo pipefail
          npm install
          npm run build
          test -d dist || { echo "::error::dist folder missing after build"; exit 1; }
          ls -la dist/

      - name: Wrangler whoami
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@3.114.17 whoami

      - name: Deploy to Cloudflare Pages
        working-directory: apps/web
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euxo pipefail
          npx --yes wrangler@3.114.17 pages deploy dist \
            --project-name=basateen-platform \
            --branch=main \
            --commit-dirty=true

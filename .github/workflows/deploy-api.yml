name: Deploy API (production)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "packages/database/**"
      - "scripts/d1-remote-migrate.sh"
      - ".github/workflows/deploy-api.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install API deps
        working-directory: apps/api
        run: npm install

      - name: Check Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::Add CLOUDFLARE_API_TOKEN in GitHub → Settings → Secrets → Actions"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Add CLOUDFLARE_ACCOUNT_ID in GitHub → Settings → Secrets → Actions"
            exit 1
          fi

      - name: Wrangler whoami
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler whoami

      # تطبيق أي ترحيل معلّق (بما فيها تصحيح التتبع الكاذب ثم 068)
      - name: D1 apply-pending (remote)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          chmod +x scripts/d1-remote-migrate.sh
          echo "=== _migrations_applied BEFORE ==="
          (cd apps/api && npx wrangler d1 execute basateen --remote --yes --command "SELECT * FROM _migrations_applied ORDER BY name;" --json) || true
          ./scripts/d1-remote-migrate.sh apply-pending
          echo "=== PRAGMA table_info(student_semester_plans) ==="
          (cd apps/api && npx wrangler d1 execute basateen --remote --yes --command "PRAGMA table_info(student_semester_plans);" --json)
          echo "=== PRAGMA index_list(student_semester_plans) ==="
          (cd apps/api && npx wrangler d1 execute basateen --remote --yes --command "PRAGMA index_list(student_semester_plans);" --json)
          echo "=== _migrations_applied AFTER ==="
          (cd apps/api && npx wrangler d1 execute basateen --remote --yes --command "SELECT * FROM _migrations_applied ORDER BY name;" --json)

      - name: Deploy Worker (production env)
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run deploy:prod

<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>مجمع حلقات البساتين</title>
    <style>
      html,
      body,
      #root {
        height: 100%;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <script>
      (function () {
        try {
          var s = localStorage.getItem("basateen-theme");
          var d =
            s === "dark" ||
            (s !== "light" &&
              window.matchMedia("(prefers-color-scheme: dark)").matches);
          if (d) document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

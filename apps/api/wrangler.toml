# Worker API — الإنتاج: wrangler deploy --env production
name = "winter-term-cb93"
main = "src/index.ts"
compatibility_date = "2024-08-01"
account_id = "01f5b1526aa792441a4b9ca33a156327"

[[d1_databases]]
binding = "DB"
database_name = "basateen"
database_id = "ab9ce5ad-7c2a-4f58-8e18-c0db7a30dfad"

# المالك يُنشئ هذا الـ bucket في لوحة Cloudflare R2 قبل النشر
[[r2_buckets]]
binding = "DISPLAY_MEDIA"
bucket_name = "basateen-display-media"

[vars]
ENVIRONMENT = "development"

[dev]
port = 8787
ip = "127.0.0.1"
local_protocol = "http"

[env.production]
name = "winter-term-cb93"

[[env.production.d1_databases]]
binding = "DB"
database_name = "basateen"
database_id = "ab9ce5ad-7c2a-4f58-8e18-c0db7a30dfad"

[[env.production.r2_buckets]]
binding = "DISPLAY_MEDIA"
bucket_name = "basateen-display-media"

[env.production.vars]
ENVIRONMENT = "production"
CORS_ALLOWED_ORIGINS = "https://basateen.sam-dev.win"

# ترحيل D1 من GitHub (Linux) — بدون wrangler-action (أخطاء أوضح + --yes)
name: D1 Migrate (remote)

on:
  workflow_dispatch:
    inputs:
      migration:
        description: "ملف SQL للتنفيذ"
        required: true
        default: all
        type: choice
        options:
          - all
          - "001"
          - "002"
          - "003"
          - "004"
          - "005"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: apps/api
        run: npm install

      - name: Check Cloudflare secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ]; then
            echo "::error::Add CLOUDFLARE_API_TOKEN in GitHub → Settings → Secrets → Actions"
            exit 1
          fi
          if [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "::error::Add CLOUDFLARE_ACCOUNT_ID in GitHub → Settings → Secrets → Actions"
            exit 1
          fi

      - name: Verify SQL files
        run: ls -la packages/database/schema/

      - name: Wrangler whoami
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler whoami

      - name: Run D1 SQL (remote)
        working-directory: apps/api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euxo pipefail
          run_file() {
            local file="$1"
            echo "========== $file =========="
            test -f "../../packages/database/schema/$file" || { echo "Missing: $file"; exit 1; }
            npx wrangler d1 execute basateen --remote --yes --file="../../packages/database/schema/$file"
          }
          case "${{ inputs.migration }}" in
            001) run_file "001_core.sql" ;;
            002) run_file "002_admin.sql" ;;
            003) run_file "003_education.sql" ;;
            004) run_file "004_programs.sql" ;;
            005) run_file "005_seed.sql" ;;
            all)
              run_file "001_core.sql"
              run_file "002_admin.sql"
              run_file "003_education.sql"
              run_file "004_programs.sql"
              run_file "005_seed.sql"
              ;;
            *) echo "Unknown migration: ${{ inputs.migration }}"; exit 1 ;;
          esac
